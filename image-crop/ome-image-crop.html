<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OME Aspect Ratio Crop Engine</title>
    <!-- Build v3.5.1 · 2026-07-21 16:25 AEST -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-surface: #16161a;
            --bg-card: #202026;
            --accent: #007aff;
            --success: #34c759;
            --warning: #ff9500;
            --text: #f5f5f7;
            --text-muted: #86868b;
            --border: #2c2c35;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-deep); color: var(--text); overflow: hidden;
            position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column;
        }
        header {
            background: var(--bg-surface); padding: 14px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .title h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
        .title span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
        .stats { display: flex; gap: 12px; }
        .stat-card {
            background: var(--bg-card); padding: 6px 12px; border-radius: 8px;
            border: 1px solid var(--border); font-size: 13px; font-weight: 500;
        }
        .stat-card span { font-weight: 700; margin-left: 4px; }
        #main-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #020203; overflow: hidden; width: 100%; }
        
        #viewport-wrapper { 
            position: relative; display: none; 
            max-width: 90vw; max-height: calc(100vh - 260px);
            filter: drop-shadow(0 12px 30px rgba(0,0,0,0.7)); 
        }
        #display-image { 
            max-width: 90vw; max-height: calc(100vh - 260px); 
            display: block; pointer-events: none; object-fit: contain;
        }
        
        #crop-overlay {
            position: absolute; border: 2px solid var(--accent);
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.78); cursor: move; touch-action: none;
        }
        #crop-overlay::before, #crop-overlay::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border-color: rgba(255,255,255,0.15); border-style: dashed; border-width: 0;
        }
        #crop-overlay::before { border-left-width: 33.33%; border-right-width: 33.33%; }
        #crop-overlay::after { border-top-width: 33.33%; border-bottom-width: 33.33%; }
        
        .handle {
            position: absolute; width: 32px; height: 32px; background: var(--text);
            border: 4px solid var(--accent); border-radius: 50%; z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .tl { top: -16px; left: -16px; cursor: nwse-resize; }
        .tr { top: -16px; right: -16px; cursor: nesw-resize; }
        .bl { bottom: -16px; left: -16px; cursor: nesw-resize; }
        .br { bottom: -16px; right: -16px; cursor: nwse-resize; }
        
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 30px; text-align: center; max-width: 500px; }
        .picker-btn {
            background: var(--accent); color: #fff; font-weight: 600; padding: 16px 36px;
            border-radius: 14px; border: none; font-size: 17px; cursor: pointer;
        }
        
        #controls {
            background: var(--bg-surface); padding: 14px 24px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; z-index: 10; gap: 10px;
        }
        .action-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
            padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 15px;
            cursor: pointer; min-width: 110px; text-align: center;
        }
        .action-btn.primary { background: var(--success); border-color: var(--success); color: #fff; }
        .action-btn.zip-btn { background: var(--accent); border-color: var(--accent); color: #fff; }
        .toggle-btn { background: #3a3a44; font-size: 13px; min-width: 90px; }

        #logger {
            height: 95px; background: #050507; border-top: 1px solid var(--border);
            font-family: monospace; font-size: 11px; padding: 10px 16px;
            overflow-y: scroll; color: #a1a1aa; user-select: text; -webkit-user-select: text;
        }
        .log-line { margin-bottom: 4px; line-height: 1.5; }
    </style>
</head>
<body>
    <header>
        <div class="title">
            <h1>IMAGE ASPECT RATIO TOOL</h1>
            <span>Build v3.5.1 · Batch ZIP Export</span>
        </div>
        <div class="stats">
            <div class="stat-card">Index: <span id="s-prog" style="color:var(--accent)">0 / 0</span></div>
            <div class="stat-card">Staged: <span id="s-save" style="color:var(--success)">0</span></div>
            <div class="stat-card">Skipped: <span id="s-skip" style="color:var(--warning)">0</span></div>
        </div>
    </header>

    <div id="main-container">
        <div id="setup">
            <p style="color: var(--text-muted); font-size: 15px; line-height: 1.6;">
                Locally standardizes media libraries to explicit 4:3 or 3:4 aspect proportions. Native matching targets skip computational processing automatically.
            </p>
            <button class="picker-btn" onclick="document.getElementById('f-in').click()">Open Photo Picker</button>
            <input type="file" id="f-in" accept="image/*" multiple style="display:none">
        </div>

        <div id="viewport-wrapper">
            <img id="display-image" alt="Active Frame Buffer">
            <div id="crop-overlay">
                <div class="handle tl" data-h="tl"></div><div class="handle tr" data-h="tr"></div>
                <div class="handle bl" data-h="bl"></div><div class="handle br" data-h="br"></div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button class="action-btn" onclick="skipPhoto()">Skip Frame</button>
        <button class="action-btn toggle-btn" onclick="toggleConsole()" id="btn-toggle-log">Hide Log</button>
        <button class="action-btn zip-btn" id="btn-zip" onclick="downloadZip()" style="display:none">Download ZIP</button>
        <button class="action-btn primary" id="btn-commit" onclick="saveCrop()">Commit Crop</button>
    </div>

    <div id="logger"></div>

    <script>
        let files = [], idx = 0, saved = 0, skipped = 0;
        let ratio = 1.333, imgW = 0, imgH = 0, scale = 1;
        let croppedQueue = [];
        const box = { x: 0, y: 0, w: 0, h: 0 };
        const ov = document.getElementById('crop-overlay');
        const img = document.getElementById('display-image');
        const wrapper = document.getElementById('viewport-wrapper');
        const setup = document.getElementById('setup');

        document.getElementById('f-in').addEventListener('change', (e) => {
            files = Array.from(e.target.files); if (!files.length) return;
            idx = 0; saved = 0; skipped = 0; croppedQueue = [];
            document.getElementById('btn-zip').style.display = 'none';
            document.getElementById('btn-commit').style.display = 'block';
            setup.style.display = 'none'; wrapper.style.display = 'block';
            log(`Pipeline initialized: ${files.length} items loaded.`, '#34c759');
            nextItem();
        });

        function log(m, color = '') {
            const p = document.getElementById('logger');
            p.innerHTML += `<div class="log-line" style="color:${color}">[${new Date().toLocaleTimeString()}] ${m}</div>`;
            p.scrollTop = p.scrollHeight;
        }

        function toggleConsole() {
            const panel = document.getElementById('logger');
            const btn = document.getElementById('btn-toggle-log');
            if (panel.style.display === 'none') {
                panel.style.display = 'block'; btn.innerText = 'Hide Log';
            } else {
                panel.style.display = 'none'; btn.innerText = 'Show Log';
            }
        }

        function extractExif(buffer) {
            try {
                const dv = new DataView(buffer);
                if (dv.getUint16(0) !== 0xFFD8) return [];
                let offset = 2, segments = [];
                while (offset < dv.byteLength - 4) {
                    const marker = dv.getUint16(offset);
                    if (marker === 0xFFD9 || marker === 0xFFDA) break;
                    const len = dv.getUint16(offset + 2);
                    if (marker >= 0xFFE0 && marker <= 0xFFEF) {
                        segments.push(buffer.slice(offset, offset + 2 + len));
                    }
                    offset += 2 + len;
                }
                return segments;
            } catch (e) { return []; }
        }

        function nextItem() {
            const total = files.length;
            
            document.getElementById('s-save').innerText = saved;
            document.getElementById('s-skip').innerText = skipped;

            if (idx >= total) {
                document.getElementById('s-prog').innerText = `${total} / ${total}`;
                log("Batch queue complete. Ready for ZIP export.", '#34c759');
                finishBatch(); 
                return;
            }
            
            document.getElementById('s-prog').innerText = `${idx + 1} / ${total}`;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const i = new Image();
                i.onload = () => {
                    imgW = i.width; imgH = i.height;
                    const r = imgW / imgH;
                    
                    if (Math.abs(r - 1.333) < 0.03 || Math.abs(r - 0.75) < 0.03) {
                        log(`Target matches aspect rules. Auto skipped: ${files[idx].name}`, '#ff9500'); 
                        skipped++; 
                        idx++; 
                        nextItem();
                    } else {
                        ratio = r > 1 ? 1.333 : 0.75;
                        img.src = e.target.result;
                        
                        setTimeout(() => {
                            const dispW = img.clientWidth || img.width;
                            const dispH = img.clientHeight || img.height;
                            
                            scale = imgW / dispW;
                            
                            if (dispW / dispH > ratio) {
                                box.h = dispH; box.w = box.h * ratio;
                            } else {
                                box.w = dispW; box.h = box.w / ratio;
                            }
                            box.x = (dispW - box.w) / 2; box.y = (dispH - box.h) / 2;
                            draw();
                        }, 50);
                    }
                };
                i.src = e.target.result;
            };
            reader.readAsDataURL(files[idx]);
        }

        function draw() {
            ov.style.width = box.w + 'px'; ov.style.height = box.h + 'px';
            ov.style.left = box.x + 'px'; ov.style.top = box.y + 'px';
        }

        function skipPhoto() { 
            log(`Manual bypass applied to: ${files[idx].name}`); 
            skipped++; 
            idx++; 
            nextItem(); 
        }

        function saveCrop() {
            const currentFile = files[idx];
            const canvas = document.createElement('canvas');
            canvas.width = box.w * scale; canvas.height = box.h * scale;
            const ctx = canvas.getContext('2d');
            const base = new Image();
            
            base.onload = () => {
                ctx.drawImage(base, box.x*scale, box.y*scale, box.w*scale, box.h*scale, 0, 0, canvas.width, canvas.height);
                
                const metaReader = new FileReader();
                metaReader.onload = (me) => {
                    const origBuffer = me.target.result;
                    const exifSegments = extractExif(origBuffer);
                    
                    canvas.toBlob((blob) => {
                        const blobReader = new FileReader();
                        blobReader.onload = (be) => {
                            const croppedBuffer = be.target.result;
                            const chunks = [croppedBuffer.slice(0, 2), ...exifSegments, croppedBuffer.slice(2)];
                            const finalBlob = new Blob(chunks, { type: currentFile.type || 'image/jpeg' });
                            
                            const orig = currentFile.name;
                            const bName = orig.substring(0, orig.lastIndexOf('.')) || orig;
                            const ext = orig.substring(orig.lastIndexOf('.')) || '.jpg';
                            const fileName = `${bName}_43crop${ext}`;

                            croppedQueue.push({ name: fileName, blob: finalBlob });
                            
                            log(`Staged for ZIP export: ${fileName}`, '#34c759'); 
                            saved++; 
                            idx++; 
                            nextItem();
                        };
                        blobReader.readAsArrayBuffer(blob);
                    }, currentFile.type || 'image/jpeg', 0.94);
                };
                metaReader.readAsArrayBuffer(currentFile);
            };
            base.src = img.src;
        }

        function finishBatch() {
            wrapper.style.display = 'none';
            document.getElementById('btn-commit').style.display = 'none';
            
            if (croppedQueue.length > 0) {
                document.getElementById('btn-zip').style.display = 'block';
                log(`Batch ready! ${croppedQueue.length} cropped photo(s) staged in memory. Click 'Download ZIP'.`, '#007aff');
            } else {
                log("No cropped images staged for download.", '#ff9500');
                reset();
            }
        }

        function downloadZip() {
            if (croppedQueue.length === 0) return;
            log("Packaging images into ZIP archive...", '#007aff');
            
            const zip = new JSZip();
            croppedQueue.forEach(item => {
                // Compression STORE prevents redundant JPEG compression & saves CPU/RAM
                zip.file(item.name, item.blob, { compression: "STORE" });
            });

            zip.generateAsync({ type: 'blob' }).then((zipContent) => {
                const zipUrl = URL.createObjectURL(zipContent);
                const a = document.createElement('a');
                a.download = `cropped_photos_${Date.now()}.zip`;
                a.href = zipUrl;
                a.click();
                
                setTimeout(() => URL.revokeObjectURL(zipUrl), 1000);
                
                log("ZIP export complete!", '#34c759');
                reset();
            }).catch(err => {
                log(`Failed to create ZIP file: ${err}`, '#ff3b30');
            });
        }

        function reset() { 
            // Explicit memory garbage collection cleanup
            croppedQueue.length = 0;
            croppedQueue = [];
            files = [];
            
            wrapper.style.display = 'none'; 
            setup.style.display = 'flex'; 
            document.getElementById('f-in').value = ''; 
            document.getElementById('btn-zip').style.display = 'none';
            document.getElementById('btn-commit').style.display = 'block';
        }

        (function initGestures() {
            let active = false, resize = false, hMode = null, sX, sY, sW, sH, sL, sT;
            ov.addEventListener('pointerdown', (e) => {
                active = true; resize = e.target.classList.contains('handle'); hMode = e.target.dataset.h;
                sX = e.clientX; sY = e.clientY; sW = box.w; sH = box.h; sL = box.x; sT = box.y;
                ov.setPointerCapture(e.pointerId); e.preventDefault();
            });

            ov.addEventListener('pointermove', (e) => {
                if (!active) return;
                const dX = e.clientX - sX, dY = e.clientY - sY;
                const mW = img.clientWidth, mH = img.clientHeight;

                if (!resize) {
                    box.x = Math.max(0, Math.min(sL + dX, mW - box.w));
                    box.y = Math.max(0, Math.min(sT + dY, mH - box.h));
                } else {
                    let nW = sW, nH = sH, nX = sL, nY = sT;
                    if (hMode === 'br') {
                        nW = Math.min(sW + dX, mW - nX, (mH - nY) * ratio); nH = nW / ratio;
                    } else if (hMode === 'bl') {
                        nW = Math.min(sW - dX, sL + sW, (mH - nY) * ratio); nH = nW / ratio; nX = sL + sW - nW;
                    } else if (hMode === 'tr') {
                        nW = Math.min(sW + dX, mW - nX, (sT + sH) * ratio); nH = nW / ratio; nY = sT + sH - nH;
                    } else if (hMode === 'tl') {
                        nW = Math.min(sW - dX, sL + sW, (sT + sH) * ratio); nH = nW / ratio; nX = sL + sW - nW; nY = sT + sH - nH;
                    }
                    if (nW > 40 && nH > 40) { box.w = nW; box.h = nH; box.x = nX; box.y = nY; }
                }
                draw(); e.preventDefault();
            });

            const stop = (e) => { if (active) { active = false; ov.releasePointerCapture(e.pointerId); } };
            ov.addEventListener('pointerup', stop); ov.addEventListener('pointercancel', stop);
            
            window.addEventListener('keydown', (e) => {
                if (wrapper.style.display !== 'block') return;
                if (e.key === 'Enter') { saveCrop(); e.preventDefault(); }
                if (e.key === ' ' || e.key === 'Spacebar') { skipPhoto(); e.preventDefault(); }
            });
        })();
    </script>
</body>
</html>
